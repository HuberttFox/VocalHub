services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vocalhub
      POSTGRES_USER: vocalhub
      POSTGRES_PASSWORD: vocalhub
    ports:
      - "5432:5432"
    volumes:
      - vocalhub-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocalhub -d vocalhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:17-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: vocalhub_test
      POSTGRES_USER: vocalhub
      POSTGRES_PASSWORD: vocalhub
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocalhub -d vocalhub_test"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  vocalhub-postgres:
