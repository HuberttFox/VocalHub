services:
  app:
    build:
      context: .
      target: app
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${VOCALHUB_PORT:-3000}:3000"
    restart: unless-stopped

  worker:
    profiles: ["worker"]
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      VOCADB_BASE_URL: ${VOCADB_BASE_URL:-https://vocadb.net/api/}
      VOCADB_USER_AGENT: ${VOCADB_USER_AGENT:?VOCADB_USER_AGENT is required}
      VOCADB_TIMEOUT_MS: ${VOCADB_TIMEOUT_MS:-10000}
      VOCADB_ACTIVITY_OVERLAP_MS: ${VOCADB_ACTIVITY_OVERLAP_MS:-900000}
      VOCADB_SETTLEMENT_LAG_MS: ${VOCADB_SETTLEMENT_LAG_MS:-120000}
      VOCADB_SYNC_CONCURRENCY: ${VOCADB_SYNC_CONCURRENCY:-2}
    restart: "no"
    stop_grace_period: 60s

  migrate:
    profiles: ["migrate"]
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DIRECT_URL: ${DIRECT_URL:-}
    restart: "no"
